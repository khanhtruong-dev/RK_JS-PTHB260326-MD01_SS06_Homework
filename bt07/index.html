<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sách</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">
        <h2 class="text-center mb-4">Danh Sách Sách Kèm Trạng Thái Xóa</h2>

        <table class="table table-bordered text-center align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Tên Sách</th>
                    <th>Tác Giả</th>
                    <th>Thao tác</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>1</td>
                    <td>Hành Trình Về Phương Đông</td>
                    <td>Baird T. Spalding</td>
                    <td>
                    <button 
                        class="btn btn-danger btn-sm"
                        data-bs-toggle="modal"
                        data-bs-target="#deleteModal">
                        Xóa
                    </button>
                    </td>
                </tr>

                <tr>
                    <td>2</td>
                    <td>Đắc Nhân Tâm</td>
                    <td>Dale Carnegie</td>
                    <td>
                    <button 
                        class="btn btn-danger btn-sm"
                        data-bs-toggle="modal"
                        data-bs-target="#deleteModal">
                        Xóa
                    </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- ✅ MODAL -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <!-- Header -->
                <div class="modal-header">
                    <h5 class="modal-title text-danger">Xác nhận xóa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <!-- Body -->
                <div class="modal-body">
                    Bạn có chắc chắn muốn xóa cuốn sách này? Hành động này không thể hoàn tác.
                </div>

                <!-- Footer -->
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    Hủy
                    </button>
                    <button type="button" class="btn btn-danger">
                    Xác nhận
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS (KHÔNG phải code của bạn) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
