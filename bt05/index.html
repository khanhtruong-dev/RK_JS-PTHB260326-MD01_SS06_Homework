<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thêm sách mới</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="text-center fw-bold mb-4">Thêm Sách Mới</h2>

                        <form>
                            <div class="mb-3">
                                <label for="bookName" class="form-label fw-semibold">Tên sách</label>
                                <input
                                type="text"
                                class="form-control form-control-lg"
                                id="bookName"
                                placeholder="Nhập tên sách..."
                                >
                            </div>

                            <div class="mb-3">
                                <label for="author" class="form-label fw-semibold">Tác giả</label>
                                <input
                                type="text"
                                class="form-control form-control-lg"
                                id="author"
                                placeholder="Nhập tên tác giả..."
                                >
                            </div>

                            <div class="mb-4">
                                <label for="category" class="form-label fw-semibold">Thể loại</label>
                                <select class="form-select form-select-lg" id="category">
                                    <option selected disabled>Chọn thể loại...</option>
                                    <option>Tiểu thuyết</option>
                                    <option>Khoa học</option>
                                    <option>Kinh doanh</option>
                                    <option>Công nghệ</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                Thêm sách
                            </button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>

</body>
</html>
